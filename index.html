<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Cat Valley</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');
        
        html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed;
            inset: 0;
            overscroll-behavior: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            max-height: 100%;
            max-width: 100vw;
            background: linear-gradient(135deg, #141a14 0%, #1a2218 35%, #1e2a18 65%, #283520 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Press Start 2P', Courier, monospace;
            color: #fff;
            overflow: hidden;
            overscroll-behavior: none;
        }
        
        #game-container {
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.7),
                        0 0 100px rgba(255, 105, 180, 0.5),
                        0 0 120px rgba(60, 100, 40, 0.35);
            border-radius: 20px;
            border: 8px solid #8B4513;
            background: rgba(0, 0, 0, 0.7);
            width: min(90vw, calc(100vw - 16px));
            height: 90vh;
            max-width: 1200px;
            max-height: 900px;
        }
        
        canvas {
            border-radius: 15px;
            image-rendering: pixelated;
            cursor: crosshair;
            box-shadow: 0 0 40px rgba(139, 69, 19, 0.9);
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        
        #ui-overlay {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #FFF;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.9),
                         0 0 25px #FFD700,
                         0 0 40px #FF69B4;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 215, 0, 0.7);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
        }
        
        #inventory {
            position: absolute;
            bottom: 25px;
            left: 25px;
            display: flex;
            gap: 15px;
        }
        
        .inventory-slot {
            width: 70px;
            height: 70px;
            border: 5px solid #5a3e29;
            background: linear-gradient(145deg, #8B4513, #5D4037);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            border-radius: 20px;
            box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.7),
                        inset 3px 3px 6px rgba(255, 255, 255, 0.2),
                        inset -3px -3px 6px rgba(0, 0, 0, 0.6);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
        }
        
        .inventory-slot:hover {
            border-color: #FFD700;
            box-shadow: 0 0 24px rgba(255, 215, 0, 0.6),
                        inset 3px 3px 6px rgba(255, 255, 255, 0.25),
                        inset -3px -3px 6px rgba(0, 0, 0, 0.6);
        }
        
        .selected {
            border-color: #FFD700;
            box-shadow: 0 0 40px #FFD700,
                        inset 4px 4px 8px rgba(255, 255, 255, 0.4),
                        inset -4px -4px 8px rgba(0, 0, 0, 0.7);
        }
        
        #time-display {
            position: absolute;
            top: 25px;
            right: 25px;
            color: #FFF;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.9),
                         0 0 25px #4d8fcc,
                         0 0 40px #5aa6ff;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 3px solid rgba(77, 143, 204, 0.7);
            box-shadow: 0 0 30px rgba(77, 143, 204, 0.7);
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
        }
        
        #day-display {
            position: absolute;
            top: 110px;
            right: 25px;
            color: #FFF;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.9),
                         0 0 25px #FF69B4,
                         0 0 40px #FF1493;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 105, 180, 0.7);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.7);
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
        }
        
        #message {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 25px 35px;
            border-radius: 25px;
            display: none;
            font-size: 18px;
            border: 4px solid #FFD700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.9),
                        inset 0 0 20px rgba(255, 215, 0, 0.4);
            backdrop-filter: blur(15px);
            z-index: 200;
            text-align: center;
            max-width: 85%;
            word-wrap: break-word;
            font-family: 'Orbitron', sans-serif;
        }
        
        @keyframes messageFromBottom {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(28px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        #message.message-show {
            animation: messageFromBottom 0.38s ease-out forwards;
        }
        
        #held-item {
            position: absolute;
            bottom: 150px;
            right: 25px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 30px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: bold;
            border: 3px solid #4d8fcc;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(77, 143, 204, 0.7);
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
        }
        
        #music-control {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            border: 3px solid #FF69B4;
            transition: background 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.7);
            z-index: 100;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
        }
        
        #music-control:hover {
            background: rgba(100, 100, 100, 0.95);
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.95);
        }
        
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
        }
        
        #title-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #141a14 0%, #1a2218 35%, #1e2a18 65%, #283520 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-family: 'Orbitron', 'Press Start 2P', Courier, monospace;
        }
        
        #title-screen h1 {
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 32px #FFD700, 0 0 50px #FF69B4, 0 0 70px #7cba4a;
            text-align: center;
            line-height: 1.4;
        }
        
        #title-screen h2 {
            font-size: 28px;
            margin-bottom: 40px;
            color: #FFD700;
            text-shadow: 0 0 25px #FF69B4, 0 0 35px #8fbc6f;
        }
        
        #start-button {
            padding: 20px 50px;
            font-size: 28px;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1, #96CEB4);
            border: none;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-family: 'Orbitron', 'Press Start 2P', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            transition: box-shadow 0.2s ease, filter 0.2s ease;
        }
        
        #start-button:hover {
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.45),
                        0 0 40px rgba(255, 215, 0, 0.5);
            filter: brightness(1.05);
        }
        
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #141a14 0%, #1a2218 35%, #1e2a18 65%, #283520 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            font-size: 32px;
            flex-direction: column;
            font-family: 'Orbitron', sans-serif;
        }
        
        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            border-top-color: #FFD700;
            margin-bottom: 30px;
            box-shadow: 0 0 30px #FFD700;
        }

        #device-select-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.72);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1200;
            backdrop-filter: blur(10px);
        }

        .device-select-card {
            background: rgba(20, 20, 20, 0.9);
            border: 3px solid #FFD700;
            border-radius: 18px;
            padding: 28px;
            width: min(92vw, 520px);
            text-align: center;
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.35);
        }

        .device-select-title {
            margin: 0 0 10px 0;
            font-size: 22px;
            color: #FFD700;
        }

        .device-select-sub {
            margin: 0 0 22px 0;
            font-size: 13px;
            opacity: 0.9;
        }

        .device-buttons {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .device-btn {
            padding: 12px 10px;
            border-radius: 12px;
            border: 2px solid #7CFC00;
            background: rgba(124, 252, 0, 0.15);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            font-weight: 700;
            transition: filter 0.2s ease;
        }

        .device-btn:hover {
            filter: brightness(1.15);
        }

        #joystick-ui {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: 160px;
            height: 160px;
            z-index: 300;
            display: none;
            touch-action: none;
        }

        #joystick-base {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.35);
        }

        #joystick-handle {
            position: absolute;
            width: 68px;
            height: 68px;
            left: 46px;
            top: 46px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.86);
            border: 2px solid rgba(120, 80, 10, 0.9);
            box-shadow: 0 0 18px rgba(255, 215, 0, 0.5);
            pointer-events: none;
        }
        
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>LOADING PIXEL CAT VALLEY...</div>
    </div>
    
    <div id="title-screen">
        <h1>PIXEL CAT VALLEY</h1>
        <h2>The Ultimate Feline Adventure</h2>
        <button id="start-button" onclick="showDeviceSelect()">BEGIN ADVENTURE</button>
    </div>

    <div id="device-select-screen">
        <div class="device-select-card">
            <h3 class="device-select-title">Choose your device</h3>
            <p class="device-select-sub">Phone/Tablet uses joystick. Computer uses keyboard (WASD/Arrows).</p>
            <div class="device-buttons">
                <button class="device-btn" id="device-phone">📱 Phone</button>
                <button class="device-btn" id="device-tablet">📟 Tablet</button>
                <button class="device-btn" id="device-computer">💻 Computer</button>
            </div>
        </div>
    </div>
    
    <div id="game-container" style="display: none;">
        <canvas id="gameCanvas"></canvas>
        <div id="particles"></div>
        <div id="ui-overlay">Energy: <span id="energy">100</span> | Gold: <span id="gold">50</span></div>
        <div id="time-display">Time: <span id="time">8:00</span></div>
        <div id="day-display">Day: <span id="day">1</span></div>
        <div id="inventory">
            <div class="inventory-slot selected" id="slot1">🎣</div>
            <div class="inventory-slot" id="slot2">🪓</div>
        </div>
        <div id="held-item">
            Held: <span id="held-item-name">None</span>
        </div>
        <div id="music-control" onclick="toggleMusic()">🔊 Music: ON</div>
        <div id="message"></div>
        <div id="joystick-ui">
            <div id="joystick-base"></div>
            <div id="joystick-handle"></div>
        </div>
    </div>
    
    <script>
        // PIXEL CAT VALLEY - The Ultimate Feline Adventure
        // Game constants
        const TILE_SIZE = 32;
        const GRID_WIDTH = 25;
        const GRID_HEIGHT = 19;
        const INTERIOR_WIDTH = 20;
        const INTERIOR_HEIGHT = 15;

        // Game variables
        let canvas, ctx;
        let player = { 
            x: 12, 
            y: 9, 
            energy: 100, 
            gold: 50,
            insideHouse: false,
            hasSlept: false,
            fishCount: 0,
            woodCount: 0,
            inventory: {
                fishingRod: 1,
                axe: 1
            },
            selectedTool: 0,
            velX: 0,
            velY: 0,
            speed: 0.25,
            lastMoveTime: 0,
            mealsEaten: 0,
            lastMealDay: 1
        };

        // Interior objects
        let interiorObjects = [];
        let mouse = { x: 5, y: 5, caught: false };

        // Game world
        let time = 8 * 60;
        let day = 1;
        let isDay = true;
        let tiles = [];
        let trees = [];
        let fishableAreas = [];
        let gameState = "title";
        let messageTimeout = null;
        let musicPlaying = true;
        let particles = [];
        let weather = "sunny";
        let raindrops = [];
        let keys = {};
        let isGameStarted = false;
        let controlMode = "keyboard";
        let joystickPointerId = null;
        let joystickVector = { x: 0, y: 0 };
        /** Clock: 1 real minute = 60 game minutes (1 in-game hour) */
        let lastGameTimeMs = 0;
        const GAME_MINUTES_PER_REAL_MS = 60 / 60000;

        // Tile types
        const TILES = {
            GRASS: 0,
            WATER: 1,
            TREE: 2,
            HOUSE_WALL: 3,
            HOUSE_FLOOR: 4,
            HOUSE_DOOR: 5,
            HOUSE_INTERIOR_FLOOR: 6,
            WATER_DISPENSER: 7,
            FLOWER: 8,
            ROCK: 9,
            BUSH: 10,
            WOOD_BLOCK: 11
        };

        // Object types for interior
        const OBJECTS = {
            FISH: 0,
            WOOD: 1,
            CUSHION: 2,
            WATER_BOWL: 3
        };

        // Sound effects (using Web Audio API)
        let audioContext;
        let sounds = {};

        // Initialize game
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Initialize audio
            initAudio();
            
            // Initialize tiles
            initTiles();
            initInteriorObjects();
            
            // Set up event listeners
            setupEventListeners();
            
            // Show loading screen
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('title-screen').style.display = 'flex';
            }, 2500);
        }

        // Setup event listeners
        function setupEventListeners() {
            // Keyboard events
            document.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
            });
            
            document.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
            });
            
            // Mouse events
            canvas.addEventListener('click', handleMouseClick);
            
            // UI events
            document.getElementById('slot1').addEventListener('click', () => selectTool(0));
            document.getElementById('slot2').addEventListener('click', () => selectTool(1));
            document.getElementById('start-button').addEventListener('click', showDeviceSelect);
            document.getElementById('device-phone').addEventListener('click', () => startGame("touch"));
            document.getElementById('device-tablet').addEventListener('click', () => startGame("touch"));
            document.getElementById('device-computer').addEventListener('click', () => startGame("keyboard"));

            setupVirtualJoystick();
            
            // Window resize event
            window.addEventListener('resize', resizeCanvas);
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }

        function showDeviceSelect() {
            document.getElementById('device-select-screen').style.display = 'flex';
        }

        function setupVirtualJoystick() {
            const base = document.getElementById('joystick-base');
            const handle = document.getElementById('joystick-handle');

            function resetJoystick() {
                joystickVector.x = 0;
                joystickVector.y = 0;
                handle.style.left = '46px';
                handle.style.top = '46px';
            }

            function updateJoystick(clientX, clientY) {
                const rect = base.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = clientX - cx;
                const dy = clientY - cy;
                const maxR = 56;
                const dist = Math.hypot(dx, dy);
                const clamped = dist > maxR ? maxR / dist : 1;
                const mx = dx * clamped;
                const my = dy * clamped;

                handle.style.left = `${46 + mx}px`;
                handle.style.top = `${46 + my}px`;
                joystickVector.x = mx / maxR;
                joystickVector.y = my / maxR;
            }

            base.addEventListener('pointerdown', (e) => {
                if (controlMode !== "touch") return;
                joystickPointerId = e.pointerId;
                base.setPointerCapture(e.pointerId);
                updateJoystick(e.clientX, e.clientY);
                e.preventDefault();
            });

            base.addEventListener('pointermove', (e) => {
                if (controlMode !== "touch") return;
                if (joystickPointerId !== e.pointerId) return;
                updateJoystick(e.clientX, e.clientY);
            });

            base.addEventListener('pointerup', (e) => {
                if (joystickPointerId !== e.pointerId) return;
                joystickPointerId = null;
                resetJoystick();
            });
            base.addEventListener('pointercancel', (e) => {
                if (joystickPointerId !== e.pointerId) return;
                joystickPointerId = null;
                resetJoystick();
            });
        }

        // Start the game
        function startGame(mode) {
            // Safety: if start is triggered without explicit device mode,
            // show chooser instead of jumping straight into gameplay.
            if (mode !== "touch" && mode !== "keyboard") {
                showDeviceSelect();
                return;
            }
            controlMode = mode;
            isGameStarted = true;
            document.getElementById('title-screen').style.display = 'none';
            document.getElementById('device-select-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('joystick-ui').style.display = controlMode === "touch" ? 'block' : 'none';
            gameState = "playing";
            lastGameTimeMs = performance.now();
            resizeCanvas();
            playBackgroundMusic();
            refreshHeldDisplay();
            createParticles(canvas.width/2, canvas.height/2, '#FFD700', 100);
            showMessage("🌟 Welcome to PIXEL CAT VALLEY! 🌟");
            setTimeout(() => {
                showMessage("🏠 Click on the door to enter/exit your house!");
            }, 3000);
        }

        // Resize canvas to fit container
        function resizeCanvas() {
            if (!canvas || !isGameStarted) return;
            
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // Update game elements to fit new size
            updateGameInfo();
        }

        // Initialize audio
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                createSounds();
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        // Create sound effects
        function createSounds() {
            // Chop sound
            sounds.chop = () => {
                if (!audioContext || !musicPlaying) return;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            };
            
            // Fish sound
            sounds.fish = () => {
                if (!audioContext || !musicPlaying) return;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.2);
            };
            
            // Door sound
            sounds.door = () => {
                if (!audioContext || !musicPlaying) return;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(220, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(110, audioContext.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            };
            
            // Sleep sound
            sounds.sleep = () => {
                if (!audioContext || !musicPlaying) return;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(220, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(110, audioContext.currentTime + 1.0);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.0);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 1.0);
            };
            
            // Rain sound
            sounds.rain = () => {
                if (!audioContext || !musicPlaying) return;
                const bufferSize = 2 * audioContext.sampleRate;
                const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioContext.createBufferSource();
                noise.buffer = noiseBuffer;
                
                const filter = audioContext.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                
                const gainNode = audioContext.createGain();
                gainNode.gain.value = 0.1;
                
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                noise.start();
                noise.stop(audioContext.currentTime + 0.5);
            };
            
            // Power-up sound
            sounds.powerup = () => {
                if (!audioContext || !musicPlaying) return;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
                oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioContext.currentTime + 0.5); // C6
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            };
            
            // Death sound
            sounds.death = () => {
                if (!audioContext || !musicPlaying) return;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(110, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(55, audioContext.currentTime + 2.0);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2.0);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 2.0);
            };
        }

        // Play background music
        function playBackgroundMusic() {
            if (!audioContext || !musicPlaying) return;
            
            const melody = [
                { note: 261.63, duration: 0.5 }, // C4
                { note: 329.63, duration: 0.5 }, // E4
                { note: 392.00, duration: 0.5 }, // G4
                { note: 523.25, duration: 1.0 }, // C5
                { note: 493.88, duration: 0.5 }, // B4
                { note: 440.00, duration: 0.5 }, // A4
                { note: 392.00, duration: 1.0 }, // G4
                { note: 329.63, duration: 0.5 }, // E4
                { note: 392.00, duration: 0.5 }, // G4
                { note: 440.00, duration: 1.0 }, // A4
                { note: 392.00, duration: 0.5 }, // G4
                { note: 329.63, duration: 0.5 }, // E4
                { note: 261.63, duration: 1.0 }  // C4
            ];
            
            let noteIndex = 0;
            
            function playNote() {
                if (!musicPlaying || gameState !== "playing") return;
                
                const note = melody[noteIndex];
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(note.note, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + note.duration);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + note.duration);
                
                noteIndex = (noteIndex + 1) % melody.length;
                
                if (musicPlaying && gameState === "playing") {
                    setTimeout(playNote, note.duration * 1000);
                }
            }
            
            playNote();
        }

        // Toggle music
        function toggleMusic() {
            musicPlaying = !musicPlaying;
            document.getElementById('music-control').textContent = musicPlaying ? '🔊 Music: ON' : '🔇 Music: OFF';
            
            if (musicPlaying && gameState === "playing") {
                playBackgroundMusic();
            }
        }

        // Update weather
        function updateWeather() {
            if (gameState !== "playing") return;
            
            const weathers = ["sunny", "rainy", "stormy"];
            weather = weathers[Math.floor(Math.random() * weathers.length)];
            
            if (weather === "rainy" || weather === "stormy") {
                raindrops = [];
                for (let i = 0; i < 150; i++) {
                    raindrops.push({
                        x: Math.random() * canvas.width,
                        y: -20 - Math.random() * 100,
                        speed: 4 + Math.random() * 6,
                        length: 8 + Math.random() * 20
                    });
                }
                
                if (sounds.rain) sounds.rain();
                showMessage(`🌧️ Weather changed to ${weather.toUpperCase()}!`);
            } else {
                raindrops = [];
                showMessage("☀️ Weather cleared!");
            }
